<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Prof - 1/2 Fond V6.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f0f2f5; }
        .header { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #eee; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        #reader { width: 100%; border-radius: 10px; }
        .big-pin { font-size: 5rem; font-weight: bold; color: #e74c3c; margin: 15px 0; border: 4px dashed #e74c3c; padding: 10px; background: #fff5f5; }
        .chrono-pill { display: inline-block; background: #27ae60; color: white; padding: 2px 6px; border-radius: 4px; margin: 2px; font-weight: bold; font-size: 0.8rem; }
        .cible-badge { background: #3498db; color: white; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        
        .team-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: white; text-transform: uppercase; margin-top: 4px; }
        .rouge { background: #DC143C; }
        .bleu { background: #1E90FF; }
        .vert { background: #2E7D32; }
        .jaune { background: #FFD700; color: black; }
        .noire { background: #222; }
        .blanc { background: #fff; color: black; border: 1px solid #ccc; }
        .orange { background: #FF8C00; }
        .violet { background: #8A2BE2; }
    </style>
</head>
<body onload="chargerDonnees()">

    <div class="header">
        <h2 style="margin:0; font-size:1.1rem;">Suivi 1/2 Fond</h2>
        <div style="display:flex; gap:8px;">
            <button class="btn" onclick="ouvrirScanner()">📸 SCAN</button>
            <button class="btn" style="background:#3498db;" onclick="exporterCSV()">📥 CSV</button>
            <button class="btn" style="background:#e74c3c; font-size:0.7rem;" onclick="reinitialiserTout()">RESET</button>
        </div>
    </div>

    <table id="tableau-scores">
        <thead>
            <tr>
                <th>Relayeurs (Équipe)</th>
                <th>Distance Totale</th>
                <th>Temps Réalisés (min:sec)</th>
                <th>Cible</th>
                <th>Dernier passage</th>
            </tr>
        </thead>
        <tbody id="corps-tableau"></tbody>
    </table>

    <div id="modale-scan" class="overlay"><div class="content"><div id="reader"></div><button class="btn" style="background:#e74c3c; margin-top:20px; width:100%" onclick="fermerTout()">ANNULER</button></div></div>

    <div id="modale-validation" class="overlay">
        <div class="content">
            <h2 id="nom-eleve" style="margin:0; font-size: 1.2rem;">---</h2>
            <p id="detail-perf" style="margin:10px 0; color:#666; font-weight:bold;"></p>
            <div id="code-pin" class="big-pin">---</div>
            <button class="btn" style="width:100%; font-size:1.3rem; padding:15px;" onclick="validerScore()">VALIDER LE RELAIS</button>
        </div>
    </div>

<script>
let html5QrCode = null, donneesScan = null, scores = {}, idsScannes = new Set();

function formatMMSS(seconds) {
    if (!seconds || seconds == 0) return "--:--";
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ":" + s.toString().padStart(2, '0');
}

function chargerDonnees() {
    const s = localStorage.getItem('rf_v3_relais_scores'), i = localStorage.getItem('rf_v3_relais_ids');
    if(s) scores = JSON.parse(s);
    if(i) idsScannes = new Set(JSON.parse(i));
    dessinerTableau();
}

function sauvegarderDonnees() {
    localStorage.setItem('rf_v3_relais_scores', JSON.stringify(scores));
    localStorage.setItem('rf_v3_relais_ids', JSON.stringify(Array.from(idsScannes)));
}

function exporterCSV() {
    let csv = "\uFEFFRelayeurs;Equipe;Course_N;Distance_Course;Chrono_Relais;Cible_Theorique;Heure_Passage\n";
    for (let k in scores) {
        let s = scores[k];
        s.courses.forEach((c, index) => {
            csv += `"${s.nom}";${s.equipe};${index + 1};${c.distRun};${c.chrono};${s.cible};${c.heure}\n`;
        });
    }
    const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = `suivi_fond.csv`;
    a.click();
}

function reinitialiserTout() { if(confirm("Effacer toutes les données prof ?")) { localStorage.clear(); location.reload(); } }

function ouvrirScanner() {
    document.getElementById("modale-scan").style.display = "flex";
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        let d = {};
        if (text.startsWith("v1*")) {
            const p = text.split("*");
            d = { 
                team: p[1], 
                player: p[2], 
                distance: parseInt(p[3]) || 0, 
                tempsRealise: parseFloat(p[4]) || 0, 
                tempsCible: parseFloat(p[5]) || 0, 
                pin: p[6], 
                id: p[7] 
            };
        } else {
            try { d = JSON.parse(text); } catch(e) { alert("Format QR inconnu"); return; }
        }

        if (idsScannes.has(d.id)) { 
            alert("DÉJÀ VALIDÉ !\nLe code PIN était : " + d.pin); 
            return; 
        }

        donneesScan = d;
        document.getElementById("modale-scan").style.display = "none";
        document.getElementById("nom-eleve").innerText = d.player;
        document.getElementById("code-pin").innerText = d.pin;
        let detail = `Distance: ${d.distance}m | Temps: ${formatMMSS(d.tempsRealise)}`;
        if (d.tempsCible > 0) detail += ` (Cible: ${formatMMSS(d.tempsCible)})`;
        document.getElementById("detail-perf").innerText = detail;
        document.getElementById("modale-validation").style.display = "flex";
        html5QrCode.stop();
    });
}

function validerScore() {
    if (!donneesScan) return;
    const key = donneesScan.player + "_" + donneesScan.team;
    const h = new Date().toLocaleTimeString("fr-FR", {hour:'2-digit', minute:'2-digit'});
    if (!scores[key]) scores[key] = { nom: donneesScan.player, equipe: donneesScan.team, distance: 0, cible: 0, courses: [] };
    
    scores[key].distance += donneesScan.distance || 0;
    if (donneesScan.tempsCible > 0) scores[key].cible = donneesScan.tempsCible;
    scores[key].courses.push({ chrono: donneesScan.tempsRealise, distRun: donneesScan.distance || 0, heure: h });
    
    idsScannes.add(donneesScan.id);
    sauvegarderDonnees(); dessinerTableau();
    document.getElementById("modale-validation").style.display = "none";
}

function dessinerTableau() {
    let html = "";
    for (let k in scores) {
        let s = scores[k];
        let chronosHtml = s.courses.map(c => `<span class="chrono-pill">${formatMMSS(c.chrono)} <small>(${c.distRun}m)</small></span>`).join('');
        let derniereHeure = s.courses.length > 0 ? s.courses[s.courses.length - 1].heure : "---";
        html += `<tr>
            <td><strong>${s.nom}</strong><br><span class="team-badge ${s.equipe}">${s.equipe}</span></td>
            <td><strong>${s.distance}m</strong></td>
            <td>${chronosHtml}</td>
            <td><span class="cible-badge">${formatMMSS(s.cible)}</span></td>
            <td>${derniereHeure}</td>
        </tr>`;
    }
    document.getElementById("corps-tableau").innerHTML = html;
}

function fermerTout() { if(html5QrCode) html5QrCode.stop().catch(()=>{}); document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }
</script>
</body>
</html>
